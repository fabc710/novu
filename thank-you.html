<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5;url=index.html" />
  <title>Thank You | Novu Insurance Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/icons/faviconnovu.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(20,41,77,0.10);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #14294D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #C9A84C;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      color: #14294D;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #4a5568;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .redirect-note {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }
    .btn {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.75rem 2rem;
      background: #C9A84C;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #b8943d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Message Sent!</h1>
    <p>Thank you for reaching out to Novu Insurance Agency.</p>
    <p>One of our licensed agents will contact you within <strong>2 business hours</strong>.</p>
    <p class="redirect-note">You'll be redirected to our homepage in 5 seconds…</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
